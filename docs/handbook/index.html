<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paketlagerdispo — Handbuch (Mitarbeiter &amp; Teamlead)</title>
    <style>
      :root {
        --bg: #0f1115; --panel: #161a22; --panel-2: #1d222c; --ink: #eef1f6;
        --muted: #98a2b3; --line: #2a313d; --radius: 12px;
        --accent: #8b7cf6; --employee: #2dd4a7; --link: #56b6ff;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      @media (prefers-color-scheme: light) {
        :root { --bg:#f6f7f9; --panel:#fff; --panel-2:#eef1f5; --ink:#1a1f28; --muted:#5b6472; --line:#dfe3ea; --link:#2563eb; }
      }
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body { margin: 0; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
      a { color: var(--link); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .layout { display: grid; grid-template-columns: 300px 1fr; align-items: start; min-height: 100vh; }
      aside { position: sticky; top: 0; height: 100vh; overflow-y: auto; border-right: 1px solid var(--line);
        background: var(--panel-2); padding: 22px 16px; }
      .brand .eyebrow { letter-spacing: .2em; text-transform: uppercase; font-size: 10.5px; color: var(--muted); font-weight: 700; }
      .brand h1 { margin: 6px 0 2px; font-size: 19px; font-weight: 800; letter-spacing: -.01em; }
      .brand h1 span { background: linear-gradient(90deg, var(--employee), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
      .brand p { margin: 4px 0 16px; font-size: 11.5px; color: var(--muted); line-height: 1.5; }
      nav a { display: block; padding: 6px 10px; border-radius: 8px; font-size: 13px; color: var(--ink); line-height: 1.3; }
      nav a:hover { background: rgba(139,124,246,.12); text-decoration: none; }
      nav a.active { background: var(--accent); color: #fff; font-weight: 600; }
      nav .grp { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); font-weight: 700; padding: 16px 10px 4px; }
      main { max-width: 900px; padding: 44px 52px 120px; margin: 0 auto; width: 100%; }
      article { font-size: 15px; line-height: 1.7; }
      article h1 { font-size: 30px; font-weight: 800; letter-spacing: -.02em; margin: 0 0 18px; }
      article h2 { font-size: 22px; font-weight: 700; margin: 34px 0 10px; padding-top: 8px; border-top: 1px solid var(--line); }
      article h3 { font-size: 17px; font-weight: 700; margin: 24px 0 8px; }
      article p, article li { color: var(--ink); }
      article code { background: var(--panel-2); padding: 1px 6px; border-radius: 5px; font-size: .88em; }
      article pre { background: var(--panel-2); padding: 14px 16px; border-radius: var(--radius); overflow-x: auto; }
      article pre code { background: none; padding: 0; }
      article table { border-collapse: collapse; width: 100%; margin: 14px 0; display: block; overflow-x: auto; }
      article th, article td { border: 1px solid var(--line); padding: 8px 11px; text-align: left; font-size: 13.5px; vertical-align: top; }
      article th { background: var(--panel-2); font-weight: 700; }
      article blockquote { border-left: 3px solid var(--accent); margin: 14px 0; padding: 4px 16px; color: var(--muted); background: var(--panel-2); border-radius: 0 8px 8px 0; }
      article .mermaid { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; margin: 16px 0; text-align: center; overflow-x: auto; }
      .pager { display: flex; justify-content: space-between; margin-top: 48px; gap: 12px; }
      .pager a { flex: 1; padding: 14px 16px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); font-size: 13px; }
      .pager a.next { text-align: right; }
      .pager .lbl { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
      .hint { margin: 0 0 18px; padding: 10px 14px; border-radius: 8px; background: var(--panel-2); color: var(--muted); font-size: 12.5px; }
      @media (max-width: 800px) {
        .layout { grid-template-columns: 1fr; }
        aside { position: static; height: auto; }
        main { padding: 24px 18px 80px; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside>
        <div class="brand">
          <div class="eyebrow">L&amp;T Logistics</div>
          <h1>Paketlagerdispo <span>Handbuch</span></h1>
          <p>Bedienanleitung für Mitarbeiter-App &amp; Teamlead-Cockpit.</p>
        </div>
        <nav id="nav"></nav>
      </aside>
      <main>
        <p class="hint">Tipp: Lokal am besten über einen kleinen Webserver öffnen — im Ordner
          <code>docs/handbook</code> den Befehl <code>python3 -m http.server</code> starten und dann
          <code>http://localhost:8000/</code> aufrufen.</p>
        <article id="content">Lädt…</article>
        <div class="pager" id="pager"></div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
      const dark = matchMedia('(prefers-color-scheme: dark)').matches;
      mermaid.initialize({ startOnLoad: false, theme: dark ? 'dark' : 'default' });

      const navEl = document.getElementById('nav');
      const contentEl = document.getElementById('content');
      const pagerEl = document.getElementById('pager');
      const pages = [];

      async function loadSummary() {
        const md = await (await fetch('SUMMARY.md')).text();
        let html = '';
        for (const line of md.split('\n')) {
          const grp = line.match(/^##\s+(.*)/);
          if (grp) { html += `<div class="grp">${grp[1]}</div>`; continue; }
          const link = line.match(/\[([^\]]+)\]\(\.\/([^)]+)\)/);
          if (link) {
            const [, label, file] = link;
            pages.push({ label, file });
            html += `<a data-file="${file}" href="#${file}">${label}</a>`;
          }
        }
        navEl.innerHTML = html;
      }

      function fixLinks(container) {
        container.querySelectorAll('a[href$=".md"]').forEach(a => {
          a.setAttribute('href', '#' + a.getAttribute('href').replace(/^\.\//, ''));
        });
      }

      async function render(file) {
        if (!file) file = pages[0]?.file || 'README.md';
        let md;
        try { md = await (await fetch(file)).text(); }
        catch { contentEl.textContent = 'Datei nicht gefunden: ' + file; return; }

        const blocks = [];
        md = md.replace(/```mermaid\n([\s\S]*?)```/g, (_, code) => {
          blocks.push(code); return `\n<div class="mermaid" data-idx="${blocks.length - 1}"></div>\n`;
        });
        contentEl.innerHTML = marked.parse(md);
        contentEl.querySelectorAll('.mermaid').forEach(el => { el.textContent = blocks[+el.dataset.idx]; });
        try { await mermaid.run({ nodes: contentEl.querySelectorAll('.mermaid') }); } catch (e) {}
        fixLinks(contentEl);

        navEl.querySelectorAll('a').forEach(a => a.classList.toggle('active', a.dataset.file === file));

        const idx = pages.findIndex(p => p.file === file);
        const prev = pages[idx - 1], next = pages[idx + 1];
        pagerEl.innerHTML =
          (prev ? `<a href="#${prev.file}"><span class="lbl">Zurück</span>${prev.label}</a>` : '<span></span>') +
          (next ? `<a class="next" href="#${next.file}"><span class="lbl">Weiter</span>${next.label}</a>` : '<span></span>');
        window.scrollTo(0, 0);
      }

      const currentFile = () => decodeURIComponent(location.hash.replace(/^#/, ''));
      addEventListener('hashchange', () => render(currentFile()));
      await loadSummary();
      await render(currentFile());
    </script>
  </body>
</html>
